<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рыба Ёж - Каталог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
                                <header class="header">
            <div class="header-container">
                <a href="index.html" class="logo-section" style="text-decoration: none; color: inherit;">
                    <img src="../Макет сайта Пуховой/Картинки/лого.png" alt="Рыба Ёж" class="logo-img">
                    <div class="logo-text">
                        <span class="logo-ryba">Рыба</span> <span class="logo-ezh">ЁЖ</span>
                    </div>
                </a>
                
                <div style="width: 300px;"></div>
                
                                <div class="contacts-section" style="display: flex; flex-direction: column; align-items: flex-start; gap: 5px; margin-top: 30px;">
                    <div class="phone" style="font-family: 'Times New Roman', Times, serif; font-size: 32px; font-weight: bold;">8 (800) 555-35-35</div>
                    <div class="links" style="display: flex; gap: 30px;">
                        <a href="#" class="link-company" style="font-family: 'Calibri', sans-serif; font-size: 24px; color: #00AEEF; text-decoration: none;">О компании</a>
                        <a href="#" class="link-news" style="font-family: 'Calibri', sans-serif; font-size: 24px; color: #F2853D; text-decoration: none;">Новости</a>
                    </div>
                </div>
                
                <div class="auth-section">
                    <div class="auth-item">
                        <img src="../Макет сайта Пуховой/Кнопки/Вход.png" alt="Профиль" class="icon-profile">
                        <a href="#" style="font-family: 'Times New Roman', Times, serif; font-size: 18px; color: #000; text-decoration: none;">Войти</a>
                    </div>
                    <div class="auth-item">
                        <a href="#" style="font-family: 'Times New Roman', Times, serif; font-size: 18px; color: #000; text-decoration: none;">Регистрация</a>
                    </div>
                </div>
                
                <div class="cart-section">
                    <img src="../Макет сайта Пуховой/Кнопки/Корзина2.png" alt="Cart" class="icon-cart">
                    <span class="cart-total" style="font-family: 'Times New Roman', Times, serif; font-size: 18px;">0 руб.</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div style="display: flex; justify-content: center; margin: 40px 0 60px 0;">
                <div class="catalog-btn" style="cursor: default;">Каталог</div>
            </div>
            
            <div class="categories-grid">
                <!-- Категория 1 -->
                <a href="cats.html" class="category-card">
                    <h3 class="category-title">Товары для кошек</h3>
                    <div class="category-img-wrap">
                        <img src="../Макет сайта Пуховой/Картинки/Кошка для каталога.jpg" alt="Товары для кошек" class="category-img">
                    </div>
                </a>

                <!-- Категория 2 -->
                <a href="dogs.html" class="category-card">
                    <h3 class="category-title">Товары для собак</h3>
                    <div class="category-img-wrap">
                        <!-- Вы можете заменить эту картинку на собаку, если у вас есть другая -->
                        <img src="../Макет сайта Пуховой/Картинки/Собака.jpg" alt="Товары для собак" class="category-img">
                    </div>
                </a>

                <!-- Категория 3 -->
                <a href="rodents.html" class="category-card">
                    <h3 class="category-title">Товары для грызунов</h3>
                    <div class="category-img-wrap">
                        <img src="../Макет сайта Пуховой/Картинки/Морская свинка.jpg" alt="Товары для грызунов" class="category-img">
                    </div>
                </a>

                <!-- Категория 4 -->
                <a href="birds.html" class="category-card">
                    <h3 class="category-title">Товары для птиц</h3>
                    <div class="category-img-wrap">
                        <img src="../Макет сайта Пуховой/Картинки/Попугай.jpg" alt="Товары для птиц" class="category-img">
                    </div>
                </a>
            </div>

        </main>

        
        
        
        
                <footer class="footer">
            <div class="footer-container">
                <div class="social-title">Мы в соцсетях:</div>
                <div class="footer-content">
                    <div class="footer-phone">8 (800) 555-35-35</div>
                    <div class="social-icons">
                        <a href="#" class="social-icon"><img src="../Макет сайта Пуховой/Кнопки/Телеграмм.png" alt="Telegram"></a>
                        <a href="#" class="social-icon"><img src="../Макет сайта Пуховой/Кнопки/ВКонтакте.png" alt="VK"></a>
                        <a href="#" class="social-icon"><img src="../Макет сайта Пуховой/Кнопки/Дзен.png" alt="Zen"></a>
                        <a href="#" class="social-icon"><img src="../Макет сайта Пуховой/Кнопки/Одноклассники.png" alt="OK"></a>
                    </div>
                    <div class="footer-credits">
                        Работает на UMI.CMS<br>
                        ИП Шеремет Э.О ИНН 401109946472
                    </div>
                </div>
